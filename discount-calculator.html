<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 Boi Plus — ডিসকাউন্ট ক্যালকুলেটর</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b17;--card:rgba(10,16,40,0.94);--text:#e6f7ff;--muted:#9cc9ff;
  --accent:#3af0ff;--accent2:#a855f7;--border:rgba(58,240,255,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;background:var(--bg);
  background-image:radial-gradient(ellipse at top left,rgba(30,63,109,.7) 0%,transparent 50%),
    radial-gradient(ellipse at bottom right,rgba(80,20,120,.5) 0%,transparent 50%);
  color:var(--text);font-family:'Noto Sans Bengali','Segoe UI',sans-serif;
  overflow-x:hidden;
}

/* ---- PARTICLES ---- */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{
  position:absolute;border-radius:50%;
  animation:float linear infinite;
  opacity:.18;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);}
  10%{opacity:.18;}
  90%{opacity:.18;}
  100%{transform:translateY(-120px) scale(1);opacity:0;}
}

/* ---- HEADER ---- */
header{
  position:relative;z-index:1;text-align:center;
  padding:44px 20px 20px;
}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 18px;border-radius:99px;margin-bottom:20px;
  border:1px solid rgba(58,240,255,.3);background:rgba(58,240,255,.07);
  color:var(--accent);font-size:.85rem;font-weight:600;
  cursor:pointer;text-decoration:none;
  transition:background .2s,border-color .2s;
}
.back-btn:hover{background:rgba(58,240,255,.15);border-color:var(--accent);}
.badge{
  display:inline-block;padding:6px 22px;border-radius:99px;
  background:rgba(58,240,255,.1);border:1px solid rgba(58,240,255,.3);
  color:var(--accent);font-size:.78rem;letter-spacing:.15em;
  text-transform:uppercase;margin-bottom:14px;
}
h1{
  font-size:clamp(1.6rem,4vw,2.6rem);font-weight:700;
  background:linear-gradient(135deg,#fff 0%,#3af0ff 50%,#bf7fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;
}
.subtitle{color:var(--muted);font-size:.92rem;max-width:500px;margin:0 auto;}

/* ---- MAIN CARD ---- */
.main-wrap{
  position:relative;z-index:1;
  max-width:520px;margin:30px auto 60px;padding:0 16px;
}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:28px;
  padding:32px 28px;backdrop-filter:blur(20px);
  box-shadow:0 24px 64px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.04) inset;
  animation:cardIn .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(40px) scale(.95);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* ---- RGB BORDER GLOW ---- */
@keyframes rgbGlow{
  0%  {box-shadow:0 0 30px rgba(58,240,255,.35),0 24px 64px rgba(0,0,0,.45);}
  33% {box-shadow:0 0 30px rgba(168,85,247,.35),0 24px 64px rgba(0,0,0,.45);}
  66% {box-shadow:0 0 30px rgba(255,121,209,.35),0 24px 64px rgba(0,0,0,.45);}
  100%{box-shadow:0 0 30px rgba(58,240,255,.35),0 24px 64px rgba(0,0,0,.45);}
}
.card{animation:cardIn .6s cubic-bezier(.34,1.56,.64,1) both, rgbGlow 5s linear infinite 0.6s;}

.sec-title{
  font-size:1.1rem;font-weight:700;color:#fff;
  display:flex;align-items:center;gap:10px;margin-bottom:22px;
}
.sec-title::before{
  content:'';width:4px;height:20px;border-radius:4px;
  background:linear-gradient(180deg,#3af0ff,#bf7fff);display:block;
}

/* ---- INPUTS ---- */
.field{margin-bottom:14px;position:relative;}
.field label{
  display:block;font-size:.78rem;color:var(--muted);
  font-weight:600;margin-bottom:5px;letter-spacing:.03em;
}
.field input{
  width:100%;padding:13px 16px;font-size:.95rem;
  border-radius:13px;border:1.5px solid rgba(58,240,255,.2);
  background:rgba(255,255,255,.04);color:#fff;
  font-family:'Noto Sans Bengali','Segoe UI',sans-serif;
  transition:border-color .22s,box-shadow .22s;outline:none;
}
.field input:focus{
  border-color:#3af0ff;
  box-shadow:0 0 0 4px rgba(58,240,255,.1);
}
.field input::placeholder{color:rgba(156,201,255,.4);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ---- HINT ---- */
.hint-box{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:rgba(58,240,255,.06);border-left:3px solid rgba(58,240,255,.4);
  border-radius:0 10px 10px 0;margin-bottom:18px;
  font-size:.82rem;color:var(--muted);
}

/* ---- CALC BTN ---- */
.calc-btn{
  width:100%;padding:15px;font-size:1rem;font-weight:700;
  border-radius:14px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#3af0ff 0%,#1a7eff 50%,#a855f7 100%);
  color:#04111f;font-family:'Noto Sans Bengali','Segoe UI',sans-serif;
  position:relative;overflow:hidden;margin-top:6px;
  transition:transform .2s,box-shadow .2s;
}
.calc-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18),transparent);
  opacity:0;transition:opacity .2s;
}
.calc-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(58,240,255,.3);}
.calc-btn:hover::before{opacity:1;}
.calc-btn:active{transform:translateY(0);}

.clear-btn{
  width:100%;padding:12px;font-size:.9rem;font-weight:600;
  border-radius:12px;border:1px solid rgba(58,240,255,.25);
  background:rgba(58,240,255,.05);color:var(--accent);
  cursor:pointer;margin-top:10px;
  font-family:'Noto Sans Bengali','Segoe UI',sans-serif;
  transition:all .2s;
}
.clear-btn:hover{background:rgba(58,240,255,.12);border-color:var(--accent);}

/* ---- PROCESSING OVERLAY ---- */
@keyframes calcPop{
  0%  {opacity:0;transform:scale(.7) rotateY(90deg);}
  60% {opacity:1;transform:scale(1.06) rotateY(-4deg);}
  100%{opacity:1;transform:scale(1) rotateY(0);}
}
@keyframes barFill{from{width:0}to{width:100%}}
@keyframes shimmer{
  0%  {background-position:-200% center;}
  100%{background-position:200% center;}
}
@keyframes bdIn{from{opacity:0}to{opacity:1}}

#procOverlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(4,8,20,.85);backdrop-filter:blur(12px);
  animation:bdIn .3s ease;
}
.proc-box{
  background:linear-gradient(145deg,rgba(7,11,30,.98),rgba(15,22,55,.98));
  border:2px solid #3af0ff;border-radius:24px;
  padding:38px 48px;text-align:center;
  animation:calcPop .5s cubic-bezier(.34,1.56,.64,1);
  min-width:270px;
}
.proc-icon{font-size:3.4rem;display:block;margin-bottom:12px;
  filter:drop-shadow(0 0 18px rgba(58,240,255,.8));}
.proc-title{font-size:1rem;font-weight:700;color:#3af0ff;margin-bottom:18px;letter-spacing:.05em;}
.proc-bar-wrap{background:rgba(58,240,255,.08);border-radius:99px;height:6px;overflow:hidden;margin-bottom:10px;}
.proc-bar{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,#3af0ff,#a855f7,#ff79d1,#3af0ff);
  background-size:200% auto;
  animation:barFill 1.1s ease forwards,shimmer 1.5s linear infinite;
}
.proc-step{font-size:.8rem;color:rgba(156,201,255,.65);min-height:1.1em;}

/* ---- RESULT CARD ---- */
@keyframes resultIn{
  from{opacity:0;transform:translateY(30px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
@keyframes rowSlide{
  from{opacity:0;transform:translateX(-16px);}
  to{opacity:1;transform:translateX(0);}
}
.result-card{
  margin-top:22px;border-radius:22px;overflow:hidden;
  border:1px solid rgba(58,240,255,.2);
  background:rgba(1,8,26,.92);
  animation:resultIn .5s cubic-bezier(.34,1.2,.64,1) both;
}
.result-header{
  padding:16px 20px;
  background:linear-gradient(90deg,rgba(58,240,255,.15),rgba(168,85,247,.15));
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;
}
.result-header strong{color:#fff;font-size:.95rem;}
.result-header span{color:#7eb8ff;font-size:.8rem;}
.r-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 20px;border-bottom:1px solid rgba(255,255,255,.04);
  animation:rowSlide .35s ease both;
}
.r-row:last-child{border-bottom:none;}
.r-row:nth-child(1){animation-delay:.05s}.r-row:nth-child(2){animation-delay:.10s}
.r-row:nth-child(3){animation-delay:.15s}.r-row:nth-child(4){animation-delay:.20s}
.r-row:nth-child(5){animation-delay:.25s}.r-row:nth-child(6){animation-delay:.30s}
.r-row:nth-child(7){animation-delay:.35s}.r-row:nth-child(8){animation-delay:.40s}
.r-key{color:#7eb8ff;font-size:.85rem;}
.r-val{color:#fff;font-weight:700;font-size:.9rem;}
.r-divider{border:none;border-top:1px dashed rgba(58,240,255,.18);margin:0;}
.r-total{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;
  background:linear-gradient(90deg,rgba(58,240,255,.12),rgba(168,85,247,.12));
  animation:rowSlide .4s .45s ease both;
}
.r-total .r-key{color:#3af0ff;font-weight:700;font-size:.92rem;}
.r-total .r-val{color:#3af0ff;font-size:1.1rem;}
.profit-pos{color:#4ade80!important;}
.profit-neg{color:#f87171!important;}
.r-footer{
  padding:12px 20px;text-align:center;
  color:rgba(156,201,255,.4);font-size:.76rem;
  border-top:1px solid rgba(255,255,255,.04);
}
.print-btn{
  width:100%;padding:12px;margin-top:14px;
  border-radius:12px;border:1px solid rgba(58,240,255,.3);
  background:rgba(58,240,255,.06);color:var(--accent);
  font-weight:700;font-size:.9rem;cursor:pointer;
  font-family:'Noto Sans Bengali','Segoe UI',sans-serif;
  transition:all .2s;
}
.print-btn:hover{background:rgba(58,240,255,.14);border-color:var(--accent);}

/* ---- RESPONSIVE ---- */
@media(max-width:480px){
  .card{padding:24px 16px;}
  .field-row{grid-template-columns:1fr;}
  .proc-box{padding:30px 28px;min-width:240px;}
}
@media print{
  body{background:#fff;color:#000;}
  .back-btn,.badge,.calc-btn,.clear-btn,.print-btn,header .subtitle,h1,.hint-box{display:none!important;}
  .card{box-shadow:none;border:none;background:#fff;}
  .result-card{border:1px solid #ccc;background:#fff;}
  .r-key{color:#333!important;}.r-val{color:#000!important;}
  .r-total .r-key,.r-total .r-val{color:#000!important;}
  .r-header{background:#f0f0f0!important;}
  .particles{display:none;}
}
</style>
</head>
<body>

<!-- Particles -->
<div class="particles" id="particles"></div>

<header>
  <a class="back-btn" href="boi-plus-admin.html">← অ্যাডমিন প্যানেলে ফিরুন</a>
  <div class="badge">⚡ BOI PLUS CALCULATOR</div>
  <h1>ডিসকাউন্ট ক্যালকুলেটর</h1>
  <p class="subtitle">বইয়ের মূল্য, ক্রয় মূল্য ও ডিসকাউন্ট দিয়ে মুহূর্তেই মেমো তৈরি করুন ✨</p>
</header>

<div class="main-wrap">
  <div class="card">
    <div class="sec-title">📊 তথ্য দিন</div>

    <div class="hint-box">💡 গায়ের মূল্য ও ক্রয় মূল্য দিলে ডিসকাউন্ট স্বয়ংক্রিয়ভাবে হিসাব হবে</div>

    <div class="field">
      <label>📖 বইয়ের নাম (Optional)</label>
      <input id="bookName" type="text" placeholder="বইয়ের নাম লিখুন...">
    </div>

    <div class="field-row">
      <div class="field">
        <label>🏷️ গায়ের মূল্য (TK)</label>
        <input id="mainPrice" type="number" placeholder="০.০০" min="0">
      </div>
      <div class="field">
        <label>💰 ক্রয় মূল্য (TK)</label>
        <input id="buyPrice" type="number" placeholder="০.০০" min="0">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>🔖 ডিসকাউন্ট %</label>
        <input id="discount" type="number" placeholder="০.০০" min="0" max="100">
      </div>
      <div class="field">
        <label>🚚 অন্যান্য খরচ (TK)</label>
        <input id="otherCost" type="number" placeholder="০.০০" min="0">
      </div>
    </div>

    <div class="field">
      <label>✍️ আপনার নাম (Optional)</label>
      <input id="adderName" type="text" list="nameList" placeholder="নাম লিখুন...">
      <datalist id="nameList">
        <option value="MD MEHEDI HASAN">
        <option value="MD KHAIRUL ISLAM">
        <option value="MD MMH TAMIM">
        <option value="WALID BIN ALI">
        <option value="MD RIPON SARKAR">
        <option value="MD NUR ALOM SIDDIK">
        <option value="SHAHRIAR HOSSAIN TABASSUM">
        <option value="MD RAJU AHMED JOY">
      </datalist>
    </div>

    <button class="calc-btn" id="calcBtn" onclick="calculate()">🧮 হিসাব করুন</button>
    <button class="clear-btn" onclick="clearAll()">🗑️ সব মুছুন</button>

    <div id="resultArea"></div>
  </div>
</div>

<script>
// ---- PARTICLES ----
(function(){
  const colors=['#3af0ff','#a855f7','#ff79d1','#8fff6a','#ffd56e'];
  const wrap=document.getElementById('particles');
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    p.className='particle';
    const s=Math.random()*6+3;
    p.style.cssText=`
      width:${s}px;height:${s}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*14+8}s;
      animation-delay:${Math.random()*-12}s;
    `;
    wrap.appendChild(p);
  }
})();

// ---- AUTO CALC ----
const mainEl=document.getElementById('mainPrice');
const buyEl =document.getElementById('buyPrice');
const discEl=document.getElementById('discount');

mainEl.addEventListener('input',()=>{
  if(buyEl.value) autoDiscount();
  else if(discEl.value) autoBuy();
});
buyEl.addEventListener('input',()=>{ if(mainEl.value) autoDiscount(); });
discEl.addEventListener('input',()=>{ if(mainEl.value) autoBuy(); });

function autoDiscount(){
  const m=+mainEl.value, b=+buyEl.value;
  if(m>0&&b>=0){ const d=((m-b)/m)*100; if(isFinite(d)) discEl.value=d.toFixed(2); }
}
function autoBuy(){
  const m=+mainEl.value, d=+discEl.value;
  if(m>0&&!isNaN(d)){ const b=m-(m*d/100); if(isFinite(b)) buyEl.value=b.toFixed(2); }
}

// ---- PROCESSING ----
function showProcessing(cb){
  const steps=['📖 বইয়ের তথ্য যাচাই করছি...','🔢 হিসাব করছি...','💹 লাভ-ক্ষতি বিশ্লেষণ...','✅ সম্পন্ন!'];
  const ov=document.createElement('div');
  ov.id='procOverlay';
  ov.innerHTML=`<div class="proc-box">
    <span class="proc-icon">🧮</span>
    <div class="proc-title">হিসাব চলছে...</div>
    <div class="proc-bar-wrap"><div class="proc-bar"></div></div>
    <div class="proc-step" id="pStep">${steps[0]}</div>
  </div>`;
  document.body.appendChild(ov);
  let i=0;
  const iv=setInterval(()=>{
    i++;
    const el=document.getElementById('pStep');
    if(el&&steps[i]) el.textContent=steps[i];
    if(i>=steps.length-1){ clearInterval(iv); setTimeout(()=>{ ov.remove(); cb(); },300); }
  },310);
}

// ---- CALCULATE ----
function calculate(){
  const mainPrice=+mainEl.value||0;
  const buyPrice =+buyEl.value||0;
  const discount =+discEl.value||0;
  const otherCost=+document.getElementById('otherCost').value||0;
  const bookName =document.getElementById('bookName').value.trim()||'N/A';
  const adderName=document.getElementById('adderName').value.trim()||'Anonymous';

  if(!mainPrice||!buyPrice){
    shake(document.getElementById('calcBtn'));
    return;
  }

  showProcessing(()=>{
    const discAmt = +(mainPrice*discount/100).toFixed(2);
    const afterDisc= +(mainPrice-discAmt).toFixed(2);
    const total    = +(afterDisc+otherCost).toFixed(2);
    const profit   = +(afterDisc-buyPrice).toFixed(2);
    const isProfit = profit>=0;

    const area=document.getElementById('resultArea');
    area.innerHTML=`
      <div class="result-card">
        <div class="result-header">
          <strong>📋 বই প্লাস ক্যাশ মেমো</strong>
          <span>${new Date().toLocaleString('bn-BD')}</span>
        </div>
        ${row('✍️ প্রস্তুতকারক', adderName)}
        ${row('📖 বইয়ের নাম', bookName)}
        <hr class="r-divider">
        ${row('🏷️ গায়ের মূল্য (MRP)', mainPrice.toFixed(2)+' TK')}
        ${row('💰 ক্রয় মূল্য', buyPrice.toFixed(2)+' TK')}
        ${row('🔖 ডিসকাউন্ট %', discount.toFixed(2)+' %')}
        ${row('💸 ডিসকাউন্ট পরিমাণ', discAmt.toFixed(2)+' TK')}
        ${row('✅ ডিসকাউন্ট পরবর্তী মূল্য', afterDisc.toFixed(2)+' TK')}
        ${row('🚚 অন্যান্য খরচ', otherCost.toFixed(2)+' TK')}
        <hr class="r-divider">
        <div class="r-total">
          <span class="r-key">💵 মোট প্রদেয় টাকা</span>
          <span class="r-val">${total.toFixed(2)} TK</span>
        </div>
        ${row(isProfit?'📈 লাভ':'📉 ক্ষতি', Math.abs(profit).toFixed(2)+' TK', isProfit?'profit-pos':'profit-neg')}
        <div class="r-footer">🛠️ Design by MMHT 📊 | Boi Plus Calculator</div>
      </div>
      <button class="print-btn" onclick="window.print()">🖨️ প্রিন্ট করুন</button>`;

    area.scrollIntoView({behavior:'smooth',block:'start'});
  });
}

function row(k,v,cls=''){
  return `<div class="r-row"><span class="r-key">${k}</span><span class="r-val ${cls}">${v}</span></div>`;
}

function clearAll(){
  ['bookName','mainPrice','buyPrice','discount','otherCost','adderName'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('resultArea').innerHTML='';
}

function shake(el){
  el.style.animation='none';
  el.style.transition='transform .08s';
  const seq=[6,-6,4,-4,0];
  let i=0;
  const iv=setInterval(()=>{
    el.style.transform=`translateX(${seq[i]||0}px)`;
    i++;if(i>=seq.length){clearInterval(iv);el.style.transform='';}
  },80);
}
</script>
</body>
</html>
